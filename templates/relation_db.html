<h1>Список машин с тегами</h1>
{% for i in number_car %}

<p>{{ i.nameCar }}</p>
<p>Категория:</p>
    {% for j in i.tags.all %}
    <p> #{{ j.name }}</p>
    {% endfor %}
<p>Коментарии:</p>
    {% for k in i.review.all %}
    <p>{{ k.marka }}</p>
    <p>{{ k.text }}</p>
    <p>{{ k.created_at }}</p>


    {% endfor %}
<hr><hr>
{% endfor %}
